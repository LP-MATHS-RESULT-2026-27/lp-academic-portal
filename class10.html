<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LP Class 10 Portal</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#081b3a,#123f7a);
color:white;
text-align:center;
}

.container{
padding:40px 20px;
}

h1{
color:gold;
margin-bottom:5px;
}

h2{
font-weight:normal;
margin-top:0;
}

.search-box{
margin-top:40px;
}

input{
width:280px;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
}

button{
margin-top:20px;
padding:12px 35px;
font-size:18px;
font-weight:bold;
background:gold;
border:none;
border-radius:10px;
cursor:pointer;
}

.back{
display:inline-block;
margin-top:40px;
padding:12px 25px;
background:white;
color:#081b3a;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

.footer{
margin-top:50px;
color:#ddd;
}
</style>

</head>

<body>

<div class="container">

<h1>LP CLASS 10 RESULT PORTAL</h1>

<h2>LEARNING POINT ACADEMIC CLASSES, JALAUN</h2>

<p>Managed By - MAYANK SIR</p>

<div class="search-box">

<input id="name" type="text" placeholder="Enter Student Name">

<br><br>

<button onclick="searchStudent()">Check Result</button>

<div id="output"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwBYhNX4GUSYigZnDDTenzga7eTai8eqEIjOSlzWffk-cP6vxqFIj-oNVl7J6ypUs4YWw/exec";

function searchStudent(){

let studentName =
document.getElementById("name").value;

fetch(
API_URL +
"?class=Class10&name=" +
encodeURIComponent(studentName)
)

.then(response => response.json())

.then(data => {

let html = "";

if(data.length == 0){

html = "<h3>No Record Found</h3>";

}
else{

html += "<h2>Test History</h2>";

html += `
<table border="1" style="margin:auto;background:white;color:black;">
<tr>
<th>Date</th>
<th>Obtained</th>
<th>Maximum</th>
<th>Rank</th>
<th>Status</th>
</tr>
`;

data.forEach(row=>{

html += `
<tr>
<td>${row.date}</td>
<td>${row.obtained}</td>
<td>${row.max}</td>
<td>${row.rank}</td>
<td>${row.status}</td>
</tr>
`;

});

html += "</table>";

}

document.getElementById("output").innerHTML = html;

});

}

</script>

</div>

<a class="back" href="index.html">⬅ Back to Home</a>

<div class="footer">
© 2026 LP Academic Portal
</div>

</div>

</body>
</html>
